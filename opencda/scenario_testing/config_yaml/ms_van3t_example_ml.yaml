vehicle_base:
  sensing:
    perception:
      activate: false # when not activated, objects positions will be retrieved from server directly
      camera:
        visualize: 0 # how many camera images need to be visualized. 0 means no visualization for camera
        num: 4 # how many cameras are mounted on the vehicle. Maximum 3(frontal, left and right cameras)
        # relative positions (x,y,z,yaw) of the camera. len(positions) should be equal to camera num
        positions:
          - [ 2.5, 0, 1.0, 0 ]
          - [ 0.0, 0.3, 1.8, 100 ]
          - [ 0.0, -0.3, 1.8, -100 ]
          - [ -2.0, 0.0, 1.5, 180 ]
      lidar: # lidar sensor configuration, check CARLA sensor reference for more details
        visualize: true

    localization: &base_localize
      activate: false # when not activated, ego position will be retrieved from server directly
      gnss: # gnss sensor configuration
        heading_direction_stddev: 0.1 # degree
        speed_stddev: 0.2
      debug_helper:
        show_animation: false # whether to show real-time trajectory plotting
        x_scale: 10.0 # used to multiply with the x coordinate to make the error on x axis clearer
        y_scale: 10.0 # used to multiply with the y coordinate to make the error on y axis clearer
  map_manager:
    visualize: false
    activate: false
  behavior: &base_behavior
    max_speed: 70 # maximum speed, km/h
    tailgate_speed: 80 # when a vehicles needs to be close to another vehicle asap
    overtake_allowed: true # whether overtake allowed, typically false for platoon leader
    collision_time_ahead: 1.1 # used for collision checking

platoon_base:
  max_capacity: 10
  inter_gap: 0.2 # desired time gap
  open_gap: 1.0 # open gap
  warm_up_speed: 30 # required speed before cooperative merging


scenario:
  town:
    name: Town10HD
  background_traffic:
    vehicle_num: 20 # Spawn background vehicles by number (spawn position is randomly generated)
  single_cav_list: # this is for merging vehicle or single cav without v2x
    - name: cav1
      spawn_position: [-69.644844, 24.471010, 0.6, 0, 0.159198, 0]  # Transform(Location(x=-64.644844, y=24.471010, z=0.600000), Rotation(pitch=0.000000, yaw=0.0, roll=0.000000))
      destination: [606.87, 145.39, 0] #[-45.1796, -38.7032, 0]
      sensing:
        perception:
          activate: true
          camera:
            visualize: 4 # how many camera images need to be visualized. 0 means no visualization for camera
            num: 4 # how many cameras are mounted on the vehicle. Maximum 3(frontal, left and right cameras)
            # relative positions (x,y,z,yaw) of the camera. len(positions) should be equal to camera num
            positions:
              - [2.5, 0, 1.0, 0]
              - [0.0, 0.3, 1.8, 100]
              - [0.0, -0.3, 1.8, -100]
              - [-2.0, 0.0, 1.5, 180]
          lidar: # lidar sensor configuration, check CARLA sensor reference for more details
            visualize: true
      v2x:
        communication_range: 35
        ms-van3t: true # whether to use ms-van3t for communication
      behavior:
        <<: *base_behavior
        max_speed: 70 # maximum speed, km/h
        tailgate_speed: 80
        overtake_allowed: true
        local_planner:
          debug_trajectory: true
          debug: false

    - name: cav2
      spawn_position: [-87.623032, 12.967159, 0.3, 0, 180, 0]
      destination: [606.87, 145.39, 0]
      sensing:
        perception:
          activate: true
          camera:
            visualize: 1 # how many camera images need to be visualized. 0 means no visualization for camera
            num: 4 # how many cameras are mounted on the vehicle. Maximum 3(frontal, left and right cameras)
            # relative positions (x,y,z,yaw) of the camera. len(positions) should be equal to camera num
            positions:
              - [2.5, 0, 1.0, 0]
              - [0.0, 0.3, 1.8, 100]
              - [0.0, -0.3, 1.8, -100]
              - [-2.0, 0.0, 1.5, 180]
          lidar: # lidar sensor configuration, check CARLA sensor reference for more details
            visualize: false
      v2x:
        communication_range: 35
        ms-van3t: true
      behavior:
        <<: *base_behavior
        max_speed: 100 # maximum speed, km/h
        tailgate_speed: 111
        overtake_allowed: true
        local_planner:
          debug_trajectory: true
          debug: false
